<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <title>Library</title>
</head>

<body>
    <header class="nav">
        <h1>Library for books made with HTML, CSS, and <span>JAVASCRIPT</span></h1>
    </header>
    <section class="add">
        <button type="button" id="addBook">Add a new book!</button>
    </section>
 <div id="library">

 </div>
    <section class="form-container">
        <form action="" id="bookForm">
            <button id="exitFormButton" type="button">Exit Form</button>
            <div class="wrapper">
                <label for="">Name Of The Book</label>
                <input type="text" name="nameOfBook" id="nameOfBook">
            </div>
            <div class="wrapper">
                <label for="">Name Of The Author</label>
                <input type="text" name="nameOfAuthor" id="nameOfAuthor">
            </div>
            <div class="wrapper">
                <label for="">Number Of Pages</label>
                <input type="text" name="numberOfPages" id="numberOfPages">
            </div>
            <div class="wrapper">
                <label for="">Have You Read this Book?</label>
                <input id="checkbox" type="checkbox">
            </div>
            <div class="wrapper">
                <button type="button" id="addBookToLibrary">Add a new book to the library +</button>
            </div>
        </form>

    </section>

    <script src="script.js"></script>
</body>

</html>
